<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page_title }} - Stock App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style4.css') }}">
    <style>
        .stock-nav-manage {
            margin-left: auto;
            color: var(--text-dark);
            text-decoration: none;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            transition: all 0.25s ease;
            font-size: 0.9em;
        }
        .stock-nav-manage:hover {
            color: #fff;
            border-color: var(--accent-color);
            background-color: var(--item-bg);
        }
        .stock-nav-manage.active {
            color: #fff;
            background-color: var(--accent-color);
            border-color: var(--accent-color);
        }
    </style>
</head>
<body>
    <header class="app-header">
        <h1>Stock App</h1>
    </header>
    
    <!-- Page loading bar -->
    <div class="page-loading-bar" id="loadingBar"></div>

    <main class="app-main">
        <nav class="stock-nav" id="stockNav">
            <a href="/stock" class="{% if active_stock == 'urgent' %}active{% endif %}">Urgent</a>
            <!-- Dynamic categories injected by JS -->
            <a href="/stock/manage" class="stock-nav-manage {% if active_stock == 'manage' %}active{% endif %}">
                + Manage
            </a>
        </nav>

        {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">
        {% include 'navigation.html' %}
    </footer>

    <script>
    // Inject dynamic category links into nav with subcategory dropdown support
    (function() {
        var activeStock = "{{ active_stock }}";
        var dropdownTimeouts = {};

        function initDropdowns(cats) {
            var nav  = document.getElementById('stockNav');
            var manageLink = nav.querySelector('.stock-nav-manage');

            // Build hierarchy
            var parents = cats.filter(function(c) { return !c.parent; });
            var byParent = {};
            cats.forEach(function(c) {
                if (c.parent) {
                    if (!byParent[c.parent]) byParent[c.parent] = [];
                    byParent[c.parent].push(c);
                }
            });

            // Render top-level categories
            parents.forEach(function(cat) {
                var subs = byParent[cat.slug];
                if (subs && subs.length) {
                    var container = document.createElement('div');
                    container.className = 'cat-sub-container';

                    var a = document.createElement('a');
                    a.href = '/stock/' + cat.slug;
                    a.className = 'cat-sub-trigger';
                    a.innerHTML = cat.title + ' <span class="caret">&#9662;</span>';
                    container.appendChild(a);

                    var subNav = document.createElement('div');
                    subNav.className = 'cat-sub-nav';
                    subs.forEach(function(sub) {
                        var subA = document.createElement('a');
                        subA.href = '/stock/' + sub.slug;
                        subA.textContent = sub.title;
                        if (activeStock === sub.slug) subA.classList.add('active');
                        subNav.appendChild(subA);
                    });
                    container.appendChild(subNav);
                    nav.insertBefore(container, manageLink);

                    // Add hover delay logic
                    var timeoutId = null;
                    container.addEventListener('mouseenter', function() {
                        if (timeoutId) clearTimeout(timeoutId);
                        container.classList.add('hovering');
                    });
                    container.addEventListener('mouseleave', function() {
                        timeoutId = setTimeout(function() {
                            container.classList.remove('hovering');
                        }, 100);
                    });
                } else {
                    var a = document.createElement('a');
                    a.href = '/stock/' + cat.slug;
                    a.textContent = cat.title;
                    if (activeStock === cat.slug) a.classList.add('active');
                    nav.insertBefore(a, manageLink);
                }
            });
        }

        // Init once categories are ready
        async function init() {
            try {
                var res  = await fetch('/api/stock_categories');
                var cats = await res.json();
                initDropdowns(cats);
            } catch(e) {}
        }
        init();
    })();

    // Page loading bar on navigation
    (function() {
        const loadingBar = document.getElementById('loadingBar');
        if (!loadingBar) return;
        
        let loadingTimeout = null;

        // Show loading bar on any link click
        document.addEventListener('click', function(e) {
            const link = e.target.closest('a');
            if (link && !link.hasAttribute('onclick') && link.getAttribute('target') !== '_blank') {
                // Skip anchor links
                if (!link.href.includes('#')) {
                    loadingBar.classList.remove('active');
                    // Force reflow to restart animation
                    void loadingBar.offsetWidth;
                    loadingBar.classList.add('active');
                    
                    // Auto-hide after 2.5 seconds
                    clearTimeout(loadingTimeout);
                    loadingTimeout = setTimeout(function() {
                        loadingBar.classList.remove('active');
                    }, 2500);
                }
            }
        });

        // Hide when page loads
        window.addEventListener('load', function() {
            loadingBar.classList.remove('active');
        });
    })();

    // Product comment editing functions
    function editComment(productId) {
        const commentDiv = document.querySelector(`[data-product-id="${productId}"]`);
        const displayDiv = commentDiv.querySelector('.comment-display');
        const editDiv = commentDiv.querySelector('.comment-edit');
        
        displayDiv.style.display = 'none';
        editDiv.style.display = 'flex';
        
        // Focus the textarea
        const textarea = editDiv.querySelector('.comment-input');
        textarea.focus();
        textarea.select();
    }

    function cancelComment(productId) {
        const commentDiv = document.querySelector(`[data-product-id="${productId}"]`);
        const displayDiv = commentDiv.querySelector('.comment-display');
        const editDiv = commentDiv.querySelector('.comment-edit');
        
        displayDiv.style.display = 'flex';
        editDiv.style.display = 'none';
        
        // Reset textarea to original value
        const textarea = editDiv.querySelector('.comment-input');
        const originalText = displayDiv.querySelector('.comment-text');
        if (originalText) {
            textarea.value = originalText.textContent;
        } else {
            textarea.value = '';
        }
    }

    async function saveComment(productId) {
        const commentDiv = document.querySelector(`[data-product-id="${productId}"]`);
        const editDiv = commentDiv.querySelector('.comment-edit');
        const textarea = editDiv.querySelector('.comment-input');
        const newComment = textarea.value.trim();
        
        try {
            const response = await fetch('/api/update_stock_comment', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    product_id: productId,
                    comment: newComment
                })
            });
            
            const result = await response.json();
            
            if (result.success) {
                // Update the display
                const displayDiv = commentDiv.querySelector('.comment-display');
                const commentText = displayDiv.querySelector('.comment-text');
                
                if (newComment) {
                    if (commentText) {
                        commentText.textContent = newComment;
                    } else {
                        // Convert "Add Note" button to display mode
                        displayDiv.innerHTML = `
                            <strong>Note:</strong> <span class="comment-text">${newComment}</span>
                            <button class="comment-edit-btn" onclick="editComment('${productId}')">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>
                            </button>
                        `;
                    }
                } else {
                    // Remove comment if empty
                    commentDiv.innerHTML = `
                        <div class="comment-display">
                            <button class="comment-add-btn" onclick="editComment('${productId}')">+ Add Note</button>
                        </div>
                        <div class="comment-edit" style="display: none;">
                            <textarea class="comment-input" placeholder="Add a note..."></textarea>
                            <div class="comment-actions">
                                <button class="comment-save-btn" onclick="saveComment('${productId}')">Save</button>
                                <button class="comment-cancel-btn" onclick="cancelComment('${productId}')">Cancel</button>
                            </div>
                        </div>
                    `;
                }
                
                // Hide edit mode
                displayDiv.style.display = 'flex';
                editDiv.style.display = 'none';
                
                // Show success message
                showStatus('Comment saved successfully', 'success');
            } else {
                showStatus('Failed to save comment: ' + result.error, 'error');
            }
        } catch (error) {
            showStatus('Error saving comment: ' + error.message, 'error');
        }
    }

    function showStatus(message, type) {
        // Remove any existing status messages
        const existing = document.querySelector('.status-message-temp');
        if (existing) existing.remove();
        
        // Create new status message
        const statusDiv = document.createElement('div');
        statusDiv.className = `status-message-temp ${type}`;
        statusDiv.textContent = message;
        statusDiv.style.cssText = `
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 16px;
            border-radius: 6px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        `;
        
        if (type === 'success') {
            statusDiv.style.backgroundColor = '#22c55e';
        } else if (type === 'error') {
            statusDiv.style.backgroundColor = '#ef4444';
        } else {
            statusDiv.style.backgroundColor = '#3b82f6';
        }
        
        document.body.appendChild(statusDiv);
        
        // Add slideIn animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
        
        // Auto remove after 3 seconds
        setTimeout(() => {
            statusDiv.style.animation = 'slideOut 0.3s ease-in';
            setTimeout(() => statusDiv.remove(), 300);
        }, 3000);
    }
    </script>
</body>
</html>
