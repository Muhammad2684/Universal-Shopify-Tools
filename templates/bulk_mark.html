<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Mark as Paid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style2.css') }}">
    <style>
        /* ── Page Loading Bar ─────────────────────────────────────────────────────── */
        .page-loading-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: #e94560;
            opacity: 0;
            z-index: 99999;
            box-shadow: 0 2px 10px rgba(233, 69, 96, 0.8);
        }
        .page-loading-bar.active {
            opacity: 1 !important;
            animation: bar-load 2s ease-in-out;
        }
        @keyframes bar-load {
            0% { transform: scaleX(0); transform-origin: left; }
            50% { transform: scaleX(0.7); transform-origin: left; }
            100% { transform: scaleX(1); transform-origin: left; }
        }
        
        /* ── Column toggle bar ── */
        .col-toggle-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 0.8em;
            color: var(--text-dark);
            flex-wrap: wrap;
        }
        .col-toggle-label {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-right: 4px;
        }
        .col-toggle-btn {
            padding: 4px 12px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: none;
            color: var(--text-dark);
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.15s;
            margin: 0;
        }
        .col-toggle-btn:hover { border-color: var(--accent-color); color: var(--text-light); transform: none; filter: none; }
        .col-toggle-btn.on {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: #fff;
        }

        /* ── Search ── */
        .search-bar-wrap {
            display: none;
            margin-top: 8px;
            margin-bottom: 4px;
        }
        .search-bar-wrap.open {
            display: block;
            animation: slideDown 0.15s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .search-bar-wrap input[type="text"] {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            background: var(--input-bg);
            color: var(--text-light);
            font-size: 0.95em;
            box-sizing: border-box;
            margin-bottom: 0;
        }
        .search-bar-wrap input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        #orderList li.search-hidden { display: none !important; }
        #searchCount { font-size: 0.82em; color: var(--text-dark); margin-left: 8px; }

        /* ── Search icon button ── */
        .btn-icon-search {
            padding: 12px 14px;
            background-color: var(--button-bg);
            color: var(--button-text);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-right: 0;
        }
        .btn-icon-search:hover { filter: brightness(0.9); transform: translateY(-2px); }
        .btn-icon-search:active { transform: translateY(0); }
        .btn-icon-search.active { background-color: var(--input-border); }

        /* ── City column (hidden by default, shown via JS) ── */
        .col-city { display: none; min-width: 100px; }
        .col-amount { min-width: 120px; text-align: right; }
    </style>
</head>
<body class="app">

<!-- Page loading bar -->
<div class="page-loading-bar" id="loadingBar"></div>

    <div class="app-header">
        <h1 style="text-align:center;">Bulk Mark as Paid</h1>
    </div>

    <div class="app-main">
        <div class="container">

            <!-- Form Controls -->
            <div class="scan-form">
                <input type="text" id="orderInput" placeholder="Enter Order Number">
                <button onclick="addOrder()">Add Order</button>
                <input type="file" id="csvInput" accept=".csv" style="display: none;" onchange="handleCsvUpload(this.files[0])">
                <button onclick="document.getElementById('csvInput').click()">Upload CSV</button>
                <button onclick="markAllAsPaid()">Mark All as Paid</button>
                <button onclick="clearAll()">Clear</button>
                <button class="btn-icon-search" id="searchToggleBtn" onclick="toggleSearch()" title="Search orders (Ctrl+F)">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </button>
            </div>

            <!-- Search bar -->
            <div class="search-bar-wrap" id="searchBarWrap">
                <input type="text" id="searchInput"
                       placeholder="Search orders..."
                       oninput="filterOrderList(this.value)"
                       onkeydown="if(event.key==='Escape') toggleSearch()">
            </div>

            <!-- Column toggle bar -->
            <div class="col-toggle-bar" id="colToggleBar" style="display:none;">
                <span class="col-toggle-label">Columns:</span>
                <button class="col-toggle-btn on"  id="togCity"   onclick="toggleColumn('city')">City</button>
                <button class="col-toggle-btn on"  id="togAmount" onclick="toggleColumn('amount')">Amount</button>
            </div>

            <!-- Status -->
            <div id="statusMessage" class="status-message" style="display:none;"></div>

            <!-- List header -->
            <div id="orderListHeader" class="order-list-header" style="display: none;">
                <div style="width: 40px; text-align: left;"><strong>#</strong></div>
                <div style="flex-grow: 1; text-align: left;">
                    <strong>Order</strong>
                    <span id="searchCount" style="display:none;"></span>
                </div>
                <div class="col-city" id="headerCity"><strong>City</strong></div>
                <div class="col-amount" id="headerAmount"><strong>Amount</strong></div>
            </div>

            <ul id="orderList" class="item-list"></ul>

            <div id="orderTotal" class="order-total" style="display: none;">
                <strong>Total: Rs.<span id="totalAmount">0</span></strong>
            </div>

            <!-- CSV Modal -->
            <div class="modal fade" id="csvModal" tabindex="-1" aria-hidden="true">
              <div class="modal-dialog modal-dialog-centered modal-lg">
                <div class="modal-content shadow-lg rounded-4">
                  <div class="modal-header">
                    <h5 class="modal-title">CSV Order Check Results</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                  </div>
                  <div class="modal-body" style="max-height: 60vh; overflow-y: auto;">
                    <div id="csv-summary" class="alert alert-info" role="alert" style="display: none;"></div>
                    <ul id="csv-list" class="item-list"></ul>
                  </div>
                  <div class="modal-footer">
                    <button id="confirmCsvOrders" class="custom-btn">Add to List</button>
                  </div>
                </div>
              </div>
            </div>

        </div>
    </div>

    <div class="app-footer">
        {% include "navigation.html" %}
    </div>

    <script src="{{ url_for('static', filename='js/main2.js') }}"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Page loading bar on all navigation
  (function() {
    const loadingBar = document.getElementById('loadingBar');
    if (!loadingBar) return;
    let loadingTimeout = null;
    document.addEventListener('click', function(e) {
      const link = e.target.closest('a');
      if (link && !link.hasAttribute('onclick') && link.getAttribute('target') !== '_blank') {
        if (!link.href.includes('#')) {
          loadingBar.classList.remove('active');
          void loadingBar.offsetWidth;
          loadingBar.classList.add('active');
          clearTimeout(loadingTimeout);
          loadingTimeout = setTimeout(function() {
            loadingBar.classList.remove('active');
          }, 2500);
        }
      }
    });
    window.addEventListener('load', function() {
      loadingBar.classList.remove('active');
    });
  })();
</script>
</body>
</html>
