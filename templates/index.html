<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Scan &amp; Pack</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* ── Search slide-down bar ── */
        .search-bar-wrap {
            display: none;
            margin-top: 8px;
        }
        .search-bar-wrap.open {
            display: block;
            animation: slideDown 0.15s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-4px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .search-bar-wrap input[type="text"] {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            background: var(--input-bg);
            color: var(--text-light);
            font-size: 0.95em;
            box-sizing: border-box;
            margin-bottom: 0;
        }
        .search-bar-wrap input[type="text"]:focus {
            border-color: var(--accent-color);
            box-shadow: none;
        }
        /* Hidden list items */
        #packedOrdersList li.search-hidden { display: none; }

        /* Search count badge */
        #searchCount {
            font-size: 0.8em;
            color: var(--text-dark);
            margin-left: 6px;
        }

        /* ── Keyboard shortcut hint ── */
        .shortcut-hint {
            font-size: 0.72em;
            color: var(--text-dark);
            margin-top: 5px;
            display: block;
        }
        kbd {
            display: inline-block;
            padding: 1px 5px;
            background: var(--item-bg);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            font-size: 0.9em;
            font-family: monospace;
            color: var(--text-light);
        }

        /* Search icon button — same size as regular buttons */
        .btn-icon-search {
            padding: 12px 14px;
            background-color: var(--button-bg);
            color: var(--button-text);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1.1em;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease, transform 0.2s ease;
            margin-right: 10px;
        }
        .btn-icon-search:hover { filter: brightness(0.9); transform: translateY(-2px); }
        .btn-icon-search:active { transform: translateY(0); }
        .btn-icon-search.active {
            background-color: var(--input-border);
        }
    </style>
</head>
<body>

<header class="app-header">
    <h1 style="text-align: center;">Scan and Pack</h1>
</header>

<main class="app-main">
    <div class="container" style="display: flex; gap: 40px;">

        <!-- Left Section -->
        <div class="container_left" style="width: 30%; border-right: 1px solid #ccc; padding-right: 20px;">
            <div style="flex: 1;">
                <label for="orderIdInput">Enter Order ID:</label>
                <input type="text" id="orderIdInput" placeholder="Scan or type order ID" autofocus>
                <button onclick="fetchOrder()">Load Order</button>
                <button onclick="clearOrder()">Clear</button>
                <span class="shortcut-hint">
                    <kbd>Enter</kbd> Load &nbsp;&nbsp; <kbd>Space</kbd> Confirm &nbsp;&nbsp; <kbd>Esc</kbd> Clear
                </span>
                <div id="statusMessage" class="status-message" style="margin-top: 10px;"></div>
            </div>

            <!-- Packed Orders List -->
            <div style="margin-top: 20px;">
                <h3>Packed Orders</h3>
                <ul id="packedOrdersList" style="list-style-type: none; padding-left: 0;"></ul>
                <p>
                    <strong>Total Packed:</strong> <span id="packedTotal">0</span>
                    <span id="searchCount" style="display:none;"></span>
                </p>

                <!-- Buttons row — all same size -->
                <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
                    <button onclick="clearPackedOrders()">Clear List</button>
                    <button onclick="addEntryToAccountant()">Add Entry</button>
                    <button class="btn-icon-search" id="searchToggleBtn" onclick="toggleSearch()" title="Search packed orders (Ctrl+F)">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </button>
                </div>

                <!-- Hidden search bar -->
                <div class="search-bar-wrap" id="searchBarWrap">
                    <input type="text" id="searchInput"
                           placeholder="Search packed orders..."
                           oninput="filterPackedList(this.value)"
                           onkeydown="if(event.key==='Escape') toggleSearch()">
                </div>
            </div>
        </div>

        <!-- Right Section -->
        <div class="container_right" style="flex: 1;">
            <h2>Order Details</h2>
            <div id="orderDetails" class="order-details" style="display: none;">
                <h3>Order: <span id="orderName"></span> (<span id="shopifyOrderId"></span>)</h3>
                <p>Fulfillment Status: <span id="fulfillmentStatus"></span></p>
                <h4>Items to Pack:</h4>
                <ul id="itemList" class="item-list"></ul>
                <button id="markPackedBtn" onclick="markOrderAsPacked()" disabled>Mark Order as Packed in Shopify</button>
            </div>
        </div>

    </div>

    <div id="imageModal" class="image-modal">
        <span class="close">×</span>
        <img class="modal-content" id="modalImage">
    </div>
</main>

<footer class="app-footer">
    {% include 'navigation.html' %}
</footer>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
