<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Scan &amp; Pack</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="app-header">
    <h1 style="text-align: center;">Scan and Pack</h1>
</header>

<main class="app-main">
    <div class="container" style="display: flex; gap: 40px;">

        <!-- Left Section -->
        <div class="container_left" style="width: 30%; border-right: 1px solid #ccc; padding-right: 20px;">
            <div style="flex: 1;">
                <label for="orderIdInput">Enter Order ID:</label>
                <input type="text" id="orderIdInput" placeholder="Scan or type order ID" autofocus>
                <button onclick="fetchOrder()">Load Order</button>
                <button onclick="clearOrder()">Clear</button>
                <span class="shortcut-hint">
                    <kbd>Enter</kbd> Load &nbsp;&nbsp; <kbd>Space</kbd> Confirm &nbsp;&nbsp; <kbd>Esc</kbd> Clear
                </span>
                <div id="statusMessage" class="status-message" style="margin-top: 10px;"></div>
            </div>

            <!-- Packed Orders List -->
            <div style="margin-top: 20px;">
                <h3>Packed Orders</h3>
                <ul id="packedOrdersList" style="list-style-type: none; padding-left: 0;"></ul>
                <p>
                    <strong>Total Packed:</strong> <span id="packedTotal">0</span>
                    <span id="searchCount" style="display:none;"></span>
                </p>
                <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
                    <button onclick="clearPackedOrders()">Clear List</button>
                    <button onclick="addEntryToAccountant()">Add Entry</button>
                    <button class="btn-icon-search" id="searchToggleBtn" onclick="toggleSearch()" title="Search packed orders (Ctrl+F)">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </button>
                </div>
                <div class="search-bar-wrap" id="searchBarWrap">
                    <input type="text" id="searchInput"
                           placeholder="Search packed orders..."
                           oninput="filterPackedList(this.value)"
                           onkeydown="if(event.key==='Escape') toggleSearch()">
                </div>
            </div>
        </div>

        <!-- Right Section -->
        <div class="container_right" style="flex: 1;">
            <h2>Order Details</h2>
            <div id="orderDetails" class="order-details" style="display: none;">

                <!-- Order header row: name + Notes button -->
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
                    <h3 style="margin:0;">Order: <span id="orderName"></span> (<span id="shopifyOrderId"></span>)</h3>
                    <button class="btn-notes" id="notesBtn" onclick="openNotesModal()">
                        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                        Order Notes
                    </button>
                </div>

                <p>Fulfillment Status: <span id="fulfillmentStatus"></span></p>

                <!-- Green box: existing notes -->
                <div class="order-notes-display" id="orderNotesDisplay">
                    <span class="notes-label">Order Note</span>
                    <span id="orderNotesText"></span>
                </div>

                <h4>Items to Pack:</h4>
                <ul id="itemList" class="item-list"></ul>
                <button id="markPackedBtn" onclick="markOrderAsPacked()" disabled>Mark Order as Packed in Shopify</button>
            </div>
        </div>

    </div>

    <div id="imageModal" class="image-modal">
        <span class="close">×</span>
        <img class="modal-content" id="modalImage">
    </div>
</main>

<footer class="app-footer">
    {% include 'navigation.html' %}
</footer>

<!-- Order Notes Modal -->
<div class="notes-overlay" id="notesOverlay" onclick="handleNotesOverlayClick(event)">
    <div class="notes-modal">
        <p class="notes-modal-title">Order Notes — <span id="notesModalOrderName"></span></p>
        <div class="notes-input-wrap">
            <span class="notes-input-label">New note</span>
            <textarea class="notes-textarea" id="notesTextarea" placeholder="Type your note here..."></textarea>
        </div>
        <div class="notes-modal-btns">
            <span class="notes-saving-msg" id="notesSavingMsg">Saving...</span>
            <button class="btn-notes-cancel" onclick="closeNotesModal()">Cancel</button>
            <button class="btn-notes-save" id="notesSaveBtn" onclick="saveOrderNote()">Save Note</button>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
